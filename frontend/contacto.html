<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florería Alesli - Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-light: #FFE4E1;
            --pink-medium: #FFB6C1;
            --pink-dark: #FF69B4;
            --wine: #722F37;
            --fuchsia: #FF00FF;
            --white: #FFFFFF;
            --gray-light: #F8F9FA;
            --gray-medium: #6C757D;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFE4E1 0%, #FFFFFF 50%, #FFE4E1 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header Styles */
        header {
            background: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--wine);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--pink-dark);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--gray-medium);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--wine);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--pink-dark);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: var(--white);
            border: 2px solid var(--pink-medium);
            color: var(--wine);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: var(--pink-medium);
            color: var(--white);
            transform: translateY(-2px);
        }

        /* Section Styles */
        section {
            padding: 4rem 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--wine);
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--pink-medium), var(--pink-dark));
        }

        /* Contacto Section */
        .contacto-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .contact-info {
            padding: 2rem;
        }

        .contact-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--wine);
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: var(--gray-medium);
        }

        .contact-item i {
            width: 20px;
            color: var(--pink-dark);
            font-size: 1.2rem;
        }

        .contact-form {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--pink-light);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--pink-medium);
        }

        .message-textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid var(--pink-light);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s ease;
            margin-bottom: 1rem;
        }

        .message-textarea:focus {
            outline: none;
            border-color: var(--pink-medium);
        }

        .submit-btn {
            width: 100%;
            background: var(--wine);
            color: var(--white);
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--fuchsia);
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .contacto-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .contact-title {
                font-size: 2rem;
            }
        }

        /* Google Fonts Import */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="container">
            <a href="inicio.html" class="logo">
                <i class="fas fa-spa"></i>
                Florería Alesli
            </a>
            
            <ul class="nav-menu">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="personalizar.html">Personalizar</a></li>
                <li><a href="quienes-somos.html">Nosotros</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
            
            <div class="nav-actions">
                <a href="#" class="nav-btn">
                    <i class="fas fa-shopping-cart"></i>
                    Carrito
                </a>
                <a href="#" class="nav-btn">
                    <i class="fas fa-user"></i>
                    Usuario
                </a>
            </div>
        </nav>
    </header>

    <!-- Contacto Section -->
    <section id="contacto">
        <div class="container">
            <h2 class="section-title">Contacto</h2>
            
            <div class="contacto-container">
                <div class="contact-info">
                    <h2 class="contact-title">Hablemos de tu ramo ideal</h2>
                    
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Av. Principal #123, Col. Centro, CP 76000</span>
                    </div>
                    
                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        <span>+52 (442) 123-4567</span>
                    </div>
                    
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>contacto@floreriaalesli.com</span>
                    </div>
                    
                    <div class="contact-item">
                        <i class="fab fa-instagram"></i>
                        <span>@floreriaalesli</span>
                    </div>
                </div>
                
                <div class="contact-form">
                    <form>
                        <input type="text" class="form-input" placeholder="Nombre" required>
                        <input type="tel" class="form-input" placeholder="Teléfono" required>
                        <input type="email" class="form-input" placeholder="Email" required>
                        <input type="text" class="form-input" placeholder="Ocasión" required>
                        <textarea class="message-textarea" placeholder="Mensaje" rows="4" required></textarea>
                        <button type="submit" class="submit-btn">Enviar pedido</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Form submission
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Create success notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, var(--pink-medium), var(--pink-dark));
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 10px;
                box-shadow: var(--shadow-hover);
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            notification.innerHTML = `
                <strong>✓ Mensaje enviado</strong><br>
                Nos pondremos en contacto contigo pronto
            `;
            
            document.body.appendChild(notification);
            
            // Reset form
            this.reset();
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        });

        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
